services:
  postgres:
    image: postgres:16-alpine
    container_name: twentyfifth-july-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twentyfifth
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: twentyfifth_july
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: twentyfifth-july-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
